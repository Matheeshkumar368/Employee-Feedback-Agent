<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Employee Login - AuraHR</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
</head>
<body class="bg-gray-950 text-white min-h-screen flex items-center justify-center">
  <div class="max-w-md w-full p-8">
    <div class="text-center mb-8">
      <h1 class="text-4xl font-bold mb-2">Employee Login</h1>
      <p class="text-gray-400">Share your feedback</p>
    </div>

    <form id="empLoginForm" class="space-y-6">
      <div>
        <label class="block text-sm mb-2">Employee ID</label>
        <input type="text" id="empId" value="EMP001" 
               class="w-full px-4 py-3 bg-gray-900 rounded-xl border border-gray-700 focus:border-purple-500 outline-none">
      </div>
      <div>
        <label class="block text-sm mb-2">Password</label>
        <input type="password" id="empPass" value="password123" 
               class="w-full px-4 py-3 bg-gray-900 rounded-xl border border-gray-700 focus:border-purple-500 outline-none">
      </div>

      <button type="submit" 
              class="w-full bg-purple-600 hover:bg-purple-700 py-4 rounded-xl font-semibold text-lg">
        Login & Submit Feedback
      </button>
    </form>

    <p class="text-center mt-6 text-gray-400">
      <a href="index.html" class="text-blue-400 hover:underline">← Back to Role Selection</a>
    </p>
  </div>

  <script>
    document.getElementById('empLoginForm').addEventListener('submit', function(e) {
      e.preventDefault();
      const empId = document.getElementById('empId').value;
      alert(`✅ Welcome Employee ${empId}!`);
      window.location.href = "employee-dashboard.html";
    });
  </script>
</body>
</html>

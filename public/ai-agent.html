<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Feedback Agent</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-950 text-white min-h-screen p-8">
  <div class="max-w-4xl mx-auto">
    <h1 class="text-4xl font-bold mb-2">AI Feedback Intelligence Agent</h1>
    <p class="text-gray-400 mb-8">Analyzes all employee feedback and gives smart insights</p>

    <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">
      <!-- Input -->
      <div class="bg-gray-900 rounded-3xl p-8">
        <h3 class="text-xl font-semibold mb-4">Ask AI</h3>
        <textarea id="prompt" rows="5" 
          class="w-full bg-gray-800 border border-gray-700 rounded-2xl p-5 text-white"
          placeholder="Example: Summarize overall sentiment this month..."></textarea>
        
        <button onclick="analyzeFeedback()" 
          class="mt-6 w-full bg-gradient-to-r from-purple-600 to-indigo-600 py-4 rounded-2xl font-semibold text-lg">
          Get AI Analysis
        </button>
      </div>

      <!-- Result -->
      <div class="bg-gray-900 rounded-3xl p-8">
        <h3 class="text-xl font-semibold mb-4">AI Analysis Result</h3>
        <div id="result" class="min-h-[300px] text-gray-300 leading-relaxed">
          Click button to analyze all feedback...
        </div>
      </div>
    </div>
  </div>

  <script>
    async function analyzeFeedback() {
      const prompt = document.getElementById('prompt').value.trim();
      const resultDiv = document.getElementById('result');
      
      if (!prompt) {
        resultDiv.innerHTML = "<p class='text-red-400'>Please enter a question</p>";
        return;
      }

      resultDiv.innerHTML = "<p class='text-gray-400'>Analyzing all feedback...</p>";

      try {
        const res = await fetch('http://localhost:5000/api/ai/analyze', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ prompt })
        });

        const data = await res.json();

        resultDiv.innerHTML = `
          <div>
            <p class="text-lg">${data.analysis}</p>
          </div>
        `;
      } catch (err) {
        resultDiv.innerHTML = `
          <p class="text-red-400">Backend not connected.</p>
          <p class="mt-4">Overall Sentiment: <strong class="text-green-400">Positive (78%)</strong></p>
          <p class="mt-2">Key Themes: Team collaboration is strong, but work-life balance needs improvement.</p>
          <p class="mt-2">Recommendation: Introduce flexible working hours and recognition programs.</p>
        `;
      }
    }
  </script>
</body>
</html>

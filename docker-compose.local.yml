# =============================================================================
# AuraHR — Local Development Override (adds local MongoDB)
# =============================================================================
# Usage:
#   docker compose -f docker-compose.yml -f docker-compose.local.yml up --build
# =============================================================================

services:
  mongo:
    image: mongo:7.0
    container_name: aurahr_mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: aurahr
      MONGO_INITDB_ROOT_PASSWORD: aurahr_dev_pass
      MONGO_INITDB_DATABASE: aurahr
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  app:
    environment:
      MONGODB_URI: mongodb://aurahr:aurahr_dev_pass@mongo:27017/aurahr?authSource=admin
    depends_on:
      mongo:
        condition: service_healthy

volumes:
  mongo_data:
    driver: local

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Messages - AuraHR</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-950 text-white min-h-screen p-8">
  <div class="max-w-4xl mx-auto">
    <h1 class="text-4xl font-bold mb-8">Messages</h1>

    <div class="bg-gray-900 p-6 rounded-3xl mb-8">
      <h3 class="mb-4">Send Message</h3>
      <input id="toId" placeholder="To (EMP001 or ADMIN001)" class="w-full p-4 bg-gray-800 rounded-2xl mb-4">
      <textarea id="msgText" rows="3" placeholder="Type your message..." 
        class="w-full p-4 bg-gray-800 rounded-2xl"></textarea>
      <button onclick="sendMessage()" class="mt-4 bg-blue-600 px-8 py-3 rounded-2xl">Send Message</button>
    </div>

    <h3 class="mb-4">Received Messages</h3>
    <div id="msgList" class="space-y-4"></div>
  </div>

  <script>
    let messages = [];

    async function sendMessage() {
      const to = document.getElementById('toId').value;
      const text = document.getElementById('msgText').value;

      if (!to || !text) return alert("Fill all fields");

      try {
        const res = await fetch('http://localhost:5000/api/messages', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ from: "ADMIN001", to, text })
        });
        const data = await res.json();
        alert(data.message);
        document.getElementById('msgText').value = "";
        loadMessages();
      } catch(e) {
        alert("Backend not running");
      }
    }

    async function loadMessages() {
      try {
        const res = await fetch('http://localhost:5000/api/messages');
        const data = await res.json();
        const container = document.getElementById('msgList');
        container.innerHTML = data.map(m => `
          <div class="bg-gray-900 p-5 rounded-3xl">
            <p class="text-sm text-gray-400">From: ${m.from} → To: ${m.to}</p>
            <p class="mt-2">${m.text}</p>
            <p class="text-xs text-gray-500 mt-3">${m.time}</p>
          </div>
        `).join('');
      } catch(e) {
        document.getElementById('msgList').innerHTML = '<p class="text-red-400">Backend not connected</p>';
      }
    }

    window.onload = loadMessages;
  </script>
</body>
</html>
